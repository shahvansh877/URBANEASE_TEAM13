<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/jpg" href="/logo.jpg" />

    <title>UrbanEase</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        background: #eef5ff;
      }

      #root {
        min-height: 100vh;
      }

      .app-loading-screen {
        min-height: 100vh;
        min-height: 100svh;
        width: 100%;
        display: grid;
        place-items: center;
        padding: clamp(24px, 6vw, 72px);
        box-sizing: border-box;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(59, 130, 246, 0.22), transparent 34%),
          radial-gradient(circle at 82% 72%, rgba(14, 165, 233, 0.20), transparent 36%),
          linear-gradient(135deg, #f8fbff 0%, #dbeafe 48%, #eff6ff 100%);
        font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
      }

      .app-loading-card {
        width: min(88vw, 420px);
        aspect-ratio: 1 / 0.82;
        min-height: 280px;
        max-height: min(70vh, 420px);
        border-radius: clamp(24px, 5vw, 38px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(16px, 4vw, 24px);
        padding: clamp(24px, 6vw, 42px);
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 80px rgba(37, 99, 235, 0.20);
        backdrop-filter: blur(18px);
        text-align: center;
      }

      .app-loading-logo {
        width: clamp(92px, 26vw, 156px);
        height: clamp(92px, 26vw, 156px);
        border-radius: clamp(22px, 5vw, 34px);
        object-fit: cover;
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
      }

      .app-loading-title {
        margin: 0;
        font-size: clamp(1.45rem, 5vw, 2.35rem);
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .app-loading-copy {
        margin: 0;
        color: #64748b;
        font-size: clamp(0.86rem, 2.5vw, 1rem);
      }

      .app-loading-bar {
        width: min(64vw, 230px);
        height: 6px;
        border-radius: 999px;
        background: #dbeafe;
        overflow: hidden;
      }

      .app-loading-bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #2563eb, #38bdf8);
        animation: app-loading-slide 1.15s ease-in-out infinite;
      }

      @keyframes app-loading-slide {
        0% { transform: translateX(-115%); }
        100% { transform: translateX(250%); }
      }

      @media (max-width: 480px) {
        .app-loading-card {
          width: min(92vw, 360px);
          aspect-ratio: auto;
          min-height: 330px;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="app-loading-screen" aria-label="UrbanEase is loading">
        <div class="app-loading-card">
          <img class="app-loading-logo" src="/logo.jpg" alt="UrbanEase logo" />
          <div>
            <h1 class="app-loading-title">UrbanEase</h1>
            <p class="app-loading-copy">Preparing your home services experience</p>
          </div>
          <div class="app-loading-bar" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
